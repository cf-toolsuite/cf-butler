name: Dependabot Auto Merge

on:
  workflow_dispatch:

jobs:
  disabled:
    name: Auto-merge disabled
    if: false
    runs-on: ubuntu-latest
    steps:
      - run: echo "Dependabot auto-merge is disabled."

